<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>PulseRTC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #080a10;
            --s1: #0f1118;
            --s2: #161b27;
            --s3: #1e2436;
            --border: rgba(255, 255, 255, .07);
            --accent: #3b82f6;
            --accent-h: #60a5fa;
            --emerald: #10b981;
            --rose: #f43f5e;
            --amber: #f59e0b;
            --violet: #8b5cf6;
            --text: #f0f4ff;
            --sub: #8892b0;
            --font: 'Plus Jakarta Sans', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html {
            height: 100%;
            height: -webkit-fill-available;
        }

        body {
            height: 100%;
            height: -webkit-fill-available;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── JOIN ── */
        #join-screen {
            min-height: 100%;
            min-height: -webkit-fill-available;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            overflow-y: auto;
            background:
                radial-gradient(circle 600px at 30% 40%, rgba(59, 130, 246, .12) 0%, transparent 70%),
                radial-gradient(circle 400px at 80% 70%, rgba(139, 92, 246, .08) 0%, transparent 60%),
                var(--bg);
        }

        .join-wrap {
            width: 100%;
            max-width: 420px;
        }

        .join-logo {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(120deg, #fff 0%, var(--accent-h) 60%, var(--violet) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .join-tagline {
            color: var(--sub);
            font-size: .88rem;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .join-card {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: clamp(22px, 6vw, 36px) clamp(18px, 6vw, 32px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, .5), 0 1px 0 rgba(255, 255, 255, .06) inset;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: .7rem;
            font-weight: 700;
            color: var(--sub);
            text-transform: uppercase;
            letter-spacing: .1em;
            margin-bottom: 7px;
        }

        .field input {
            width: 100%;
            padding: 13px 16px;
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: var(--font);
            font-size: 1rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            -webkit-appearance: none;
        }

        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .15);
        }

        .field input::placeholder {
            color: var(--sub);
            opacity: .6;
        }

        .join-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            border-radius: 11px;
            color: #fff;
            font-family: var(--font);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
            touch-action: manipulation;
            transition: background .2s, transform .15s;
            box-shadow: 0 4px 20px rgba(59, 130, 246, .3);
        }

        .join-btn:active {
            transform: scale(.97);
            background: var(--accent-h);
        }

        /* ── APP SHELL ── */
        #app {
            display: none;
            flex-direction: column;
            position: fixed;
            inset: 0;
        }

        #app.active {
            display: flex;
        }

        /* topbar */
        .topbar {
            height: calc(52px + var(--safe-top));
            padding-top: var(--safe-top);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 14px;
            padding-right: 14px;
            background: var(--s1);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .topbar-logo {
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: -.5px;
            white-space: nowrap;
        }

        .topbar-logo em {
            color: var(--accent);
            font-style: normal;
        }

        .room-tag {
            font-family: var(--mono);
            font-size: .7rem;
            background: var(--s2);
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: 20px;
            color: var(--sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px;
        }

        .room-tag b {
            color: var(--text);
        }

        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .me-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--s2);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: .78rem;
            font-weight: 600;
            max-width: 110px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .online-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--emerald);
            box-shadow: 0 0 6px var(--emerald);
            flex-shrink: 0;
        }

        .ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--rose);
            flex-shrink: 0;
            transition: background .3s;
        }

        .ws-dot.connected {
            background: var(--emerald);
            box-shadow: 0 0 6px var(--emerald);
        }

        /* layout */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* desktop sidebar */
        .sidebar {
            width: 200px;
            flex-shrink: 0;
            background: var(--s1);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-section {
            padding: 14px 12px 6px;
            font-size: .65rem;
            font-weight: 700;
            color: var(--sub);
            text-transform: uppercase;
            letter-spacing: .1em;
        }

        #users-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px 12px;
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 9px;
            border-radius: 9px;
            margin-bottom: 2px;
            transition: background .15s;
        }

        .user-row:hover {
            background: var(--s2);
        }

        .av {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .85rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-info .uname {
            font-size: .82rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-info .ustag {
            font-size: .65rem;
            color: var(--sub);
        }

        .peer-btns {
            display: flex;
            gap: 4px;
        }

        .peer-btn {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .78rem;
            cursor: pointer;
            touch-action: manipulation;
            transition: transform .1s;
        }

        .peer-btn:active {
            transform: scale(.88);
        }

        .pbtn-v {
            background: rgba(16, 185, 129, .15);
            color: var(--emerald);
        }

        .pbtn-a {
            background: rgba(59, 130, 246, .15);
            color: var(--accent);
        }

        /* video section */
        .video-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
            min-width: 0;
        }

        .video-grid {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 8px;
            padding: 10px;
            align-content: start;
        }

        .v-tile {
            position: relative;
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            aspect-ratio: 16/9;
            transition: border-color .2s;
        }

        .v-tile.speaking {
            border-color: var(--emerald);
            box-shadow: 0 0 0 2px rgba(16, 185, 129, .25);
        }

        .v-tile video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #000;
        }

        .v-tile .tname {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0, 0, 0, .7);
            backdrop-filter: blur(10px);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: .72rem;
            font-weight: 600;
        }

        .v-tile .tmute {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, .7);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: .8rem;
        }

        .v-tile.muted .tmute {
            display: flex;
        }

        .v-tile .no-cam {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
            background: var(--s2);
            color: var(--sub);
            font-size: .85rem;
        }

        .v-tile .no-cam .big {
            font-size: 2.2rem;
        }

        .v-tile.cam-off .no-cam {
            display: flex;
        }

        /* controls */
        .controls {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--s1);
            border-top: 1px solid var(--border);
        }

        .cbtn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            touch-action: manipulation;
            background: var(--s2);
            color: var(--text);
            transition: transform .15s, background .2s, border-color .2s;
        }

        .cbtn:active {
            transform: scale(.88);
        }

        .cbtn.on {
            background: var(--accent);
            border-color: var(--accent);
        }

        .cbtn.warn {
            background: rgba(244, 63, 94, .15);
            border-color: rgba(244, 63, 94, .4);
            color: var(--rose);
        }

        .cbtn.end {
            background: var(--rose);
            border-color: var(--rose);
            width: 52px;
            height: 52px;
            font-size: 1.2rem;
        }

        /* desktop chat */
        .chat-panel {
            width: 290px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--s1);
            border-left: 1px solid var(--border);
        }

        .chat-head {
            height: 48px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            font-size: .75rem;
            font-weight: 700;
            color: var(--sub);
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        .badge {
            background: var(--accent);
            color: #fff;
            font-size: .6rem;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 20px;
            display: none;
            margin-left: auto;
        }

        .msgs {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overscroll-behavior: contain;
        }

        .msg {
            max-width: 92%;
            display: flex;
            flex-direction: column;
        }

        .msg.mine {
            align-self: flex-end;
            align-items: flex-end;
        }

        .msg .mmeta {
            font-size: .65rem;
            color: var(--sub);
            margin-bottom: 3px;
        }

        .mbubble {
            padding: 8px 12px;
            border-radius: 13px;
            font-size: .84rem;
            line-height: 1.55;
            word-break: break-word;
            background: var(--s2);
            border: 1px solid var(--border);
        }

        .msg.mine .mbubble {
            background: rgba(59, 130, 246, .18);
            border-color: rgba(59, 130, 246, .3);
        }

        .mfile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 13px;
            background: var(--s2);
            border: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
            transition: border-color .2s;
        }

        .mfile:active {
            border-color: var(--accent);
        }

        .mfile .ficon {
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .mfile .finfo .fname {
            font-size: .8rem;
            font-weight: 600;
        }

        .mfile .finfo .fsize {
            font-size: .66rem;
            color: var(--sub);
            margin-top: 1px;
        }

        .cinput-area {
            padding: 8px 10px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .cinput-row {
            display: flex;
            gap: 6px;
            align-items: flex-end;
        }

        .cinput-area textarea {
            flex: 1;
            padding: 9px 12px;
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: var(--font);
            font-size: 1rem;
            resize: none;
            height: 40px;
            max-height: 100px;
            outline: none;
            transition: border-color .2s;
            -webkit-appearance: none;
        }

        .cinput-area textarea:focus {
            border-color: var(--accent);
        }

        .cinput-area textarea::placeholder {
            color: var(--sub);
            opacity: .6;
        }

        .ibtn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .95rem;
            cursor: pointer;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        .ibtn:active {
            transform: scale(.88);
        }

        .ibtn-send {
            background: var(--accent);
            color: #fff;
        }

        .ibtn-file {
            background: var(--s2);
            border: 1px solid var(--border);
            color: var(--sub);
        }

        /* ── MOBILE TAB BAR ── */
        .tab-bar {
            display: none;
            flex-shrink: 0;
            height: calc(56px + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: var(--s1);
            border-top: 1px solid var(--border);
            align-items: stretch;
            z-index: 20;
        }

        .tab-item {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            border: none;
            background: transparent;
            color: var(--sub);
            font-family: var(--font);
            font-size: .62rem;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            padding-bottom: 2px;
        }

        .tab-item .ti {
            font-size: 1.2rem;
            line-height: 1;
        }

        .tab-item.active {
            color: var(--accent);
        }

        .tbadge {
            position: absolute;
            top: 6px;
            right: calc(50% - 18px);
            background: var(--rose);
            color: #fff;
            font-size: .55rem;
            font-weight: 700;
            min-width: 16px;
            height: 16px;
            padding: 0 4px;
            border-radius: 20px;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .tbadge.show {
            display: flex;
        }

        /* ── MOBILE DRAWERS ── */
        .drawer-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            z-index: 30;
            backdrop-filter: blur(4px);
        }

        .drawer-overlay.show {
            display: block;
        }

        .drawer {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            width: 88%;
            max-width: 320px;
            background: var(--s1);
            z-index: 40;
            display: flex;
            flex-direction: column;
            transform: translateX(-110%);
            transition: transform .3s cubic-bezier(.4, 0, .2, 1);
            box-shadow: 4px 0 40px rgba(0, 0, 0, .5);
        }

        .drawer.right {
            left: auto;
            right: 0;
            transform: translateX(110%);
        }

        .drawer.open {
            transform: translateX(0);
        }

        .drawer-header {
            height: calc(52px + var(--safe-top));
            padding-top: var(--safe-top);
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 16px;
            padding-right: 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            font-size: .8rem;
            font-weight: 700;
            color: var(--sub);
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        .drawer-close {
            margin-left: auto;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: var(--s2);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            touch-action: manipulation;
        }

        /* ── INCOMING CALL ── */
        #call-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .8);
            backdrop-filter: blur(16px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        #call-overlay.show {
            display: flex;
        }

        .call-modal {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 44px;
            text-align: center;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 60px 120px rgba(0, 0, 0, .6);
            animation: callIn .3s cubic-bezier(.34, 1.56, .64, 1);
        }

        @keyframes callIn {
            from {
                opacity: 0;
                transform: scale(.85)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        .call-av {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0 auto 16px;
            animation: ring 1.6s ease-in-out infinite;
        }

        @keyframes ring {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(59, 130, 246, .5)
            }

            50% {
                box-shadow: 0 0 0 18px rgba(59, 130, 246, .0)
            }
        }

        .call-modal h2 {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .call-modal p {
            color: var(--sub);
            font-size: .86rem;
            margin-bottom: 28px;
        }

        .call-actions {
            display: flex;
            gap: 24px;
            justify-content: center;
        }

        .ca-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            touch-action: manipulation;
        }

        .ca-btn:active {
            transform: scale(.9);
        }

        .ca-accept {
            background: var(--emerald);
            color: #fff;
        }

        .ca-decline {
            background: var(--rose);
            color: #fff;
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: calc(72px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(64px);
            background: var(--s2);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 10px;
            font-size: .82rem;
            color: var(--text);
            transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
            z-index: 200;
            white-space: nowrap;
            pointer-events: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
            max-width: calc(100vw - 32px);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        ::-webkit-scrollbar {
            width: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--s3);
            border-radius: 4px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width:900px) {
            .sidebar {
                width: 58px;
            }

            .sidebar-section,
            .user-info {
                display: none;
            }

            .peer-btns {
                flex-direction: column;
                gap: 3px;
            }

            .chat-panel {
                width: 260px;
            }
        }

        @media (max-width:640px) {

            .sidebar,
            .chat-panel {
                display: none;
            }

            .tab-bar {
                display: flex;
            }

            .video-grid {
                grid-template-columns: 1fr;
                padding: 8px;
                gap: 6px;
            }

            .controls {
                gap: 12px;
                padding: 10px 12px;
            }

            .cbtn {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }

            .cbtn.end {
                width: 56px;
                height: 56px;
            }

            #toast {
                bottom: calc(68px + var(--safe-bottom));
            }
        }

        @media (max-width:360px) {
            .cbtn {
                width: 44px;
                height: 44px;
                font-size: 1rem;
            }

            .cbtn.end {
                width: 50px;
                height: 50px;
            }
        }

        @media (max-width:640px) and (orientation:landscape) {
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
                padding: 5px;
                gap: 5px;
            }

            .controls {
                padding: 6px 12px;
            }

            .cbtn {
                width: 42px;
                height: 42px;
                font-size: 1rem;
            }

            .cbtn.end {
                width: 48px;
                height: 48px;
            }
        }

        @media (min-width:641px) {

            .drawer,
            .drawer-overlay {
                display: none !important;
            }
        }
    </style>
</head>

<body>

    <!-- JOIN -->
    <div id="join-screen">
        <div class="join-wrap">
            <div class="join-logo">PulseRTC</div>
            <div class="join-tagline">Peer-to-peer video, voice, chat &amp; file sharing — no plugins needed.</div>
            <div class="join-card">
                <div class="field"><label>Your Name</label><input id="inp-name" type="text" placeholder="e.g. Jordan"
                        autocomplete="off" autocorrect="off" spellcheck="false" /></div>
                <div class="field"><label>Room ID</label><input id="inp-room" type="text" placeholder="e.g. design-sync"
                        autocomplete="off" autocorrect="off" spellcheck="false" /></div>
                <button class="join-btn" id="btn-join">Enter Room &#8594;</button>
            </div>
        </div>
    </div>

    <!-- APP -->
    <div id="app">
        <div class="topbar">
            <span class="topbar-logo">Pulse<em>RTC</em></span>
            <div class="room-tag">Room: <b id="room-label"></b></div>
            <div class="topbar-right">
                <div class="ws-dot" id="ws-dot"></div>
                <div class="me-pill">
                    <div class="online-dot"></div><span id="me-label"></span>
                </div>
            </div>
        </div>

        <div class="layout">
            <!-- Desktop sidebar -->
            <div class="sidebar">
                <div class="sidebar-section">People</div>
                <div id="users-list"></div>
            </div>
            <!-- Video -->
            <div class="video-section">
                <div class="video-grid" id="video-grid"></div>
                <div class="controls">
                    <button class="cbtn on" id="btn-mic">&#127908;</button>
                    <button class="cbtn on" id="btn-cam">&#128247;</button>
                    <button class="cbtn" id="btn-screen">&#128421;&#65039;</button>
                    <button class="cbtn end" id="btn-hangup">&#128245;</button>
                </div>
            </div>
            <!-- Desktop chat -->
            <div class="chat-panel">
                <div class="chat-head">&#128172; Messages<span class="badge" id="badge">0</span></div>
                <div class="msgs" id="msgs-desktop"></div>
                <div class="cinput-area">
                    <div class="cinput-row">
                        <textarea id="msg-txt-desktop" placeholder="Type a message&#x2026;" rows="1"></textarea>
                        <button class="ibtn ibtn-file" id="btn-file-desktop">&#128206;</button>
                        <button class="ibtn ibtn-send" id="btn-send-desktop">&#10148;</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mobile tab bar -->
        <div class="tab-bar">
            <button class="tab-item active" id="tab-video" data-tab="video"><span
                    class="ti">&#128249;</span>Video</button>
            <button class="tab-item" id="tab-people" data-tab="people"><span class="ti">&#128101;</span>People<span
                    class="tbadge" id="people-badge"></span></button>
            <button class="tab-item" id="tab-chat" data-tab="chat"><span class="ti">&#128172;</span>Chat<span
                    class="tbadge" id="chat-badge"></span></button>
        </div>
    </div>

    <!-- Mobile drawer: People -->
    <div class="drawer-overlay" id="overlay-people"></div>
    <div class="drawer" id="drawer-people">
        <div class="drawer-header">&#128101; Participants<button class="drawer-close"
                id="close-people">&#x2715;</button></div>
        <div id="users-list-mobile" style="flex:1;overflow-y:auto;padding:8px 10px 12px;"></div>
    </div>

    <!-- Mobile drawer: Chat -->
    <div class="drawer-overlay" id="overlay-chat"></div>
    <div class="drawer right" id="drawer-chat">
        <div class="drawer-header">&#128172; Messages<button class="drawer-close" id="close-chat">&#x2715;</button>
        </div>
        <div class="msgs" id="msgs-mobile" style="flex:1;padding:10px;"></div>
        <div class="cinput-area">
            <div class="cinput-row">
                <textarea id="msg-txt-mobile" placeholder="Type a message&#x2026;" rows="1"></textarea>
                <button class="ibtn ibtn-file" id="btn-file-mobile">&#128206;</button>
                <button class="ibtn ibtn-send" id="btn-send-mobile">&#10148;</button>
            </div>
        </div>
    </div>

    <!-- Incoming call -->
    <div id="call-overlay">
        <div class="call-modal">
            <div class="call-av" id="call-av"></div>
            <h2 id="call-caller">Incoming</h2>
            <p id="call-kind">Video Call</p>
            <div class="call-actions">
                <button class="ca-btn ca-accept" id="btn-accept">&#9989;</button>
                <button class="ca-btn ca-decline" id="btn-decline">&#10060;</button>
            </div>
        </div>
    </div>

    <input type="file" id="file-inp" hidden />
    <div id="toast"></div>

    <script type="module">
        const $ = s => document.querySelector(s);
        const $$ = s => document.querySelectorAll(s);
        const mk = (tag, cls) => { const e = document.createElement(tag); if (cls) e.className = cls; return e; };
        const isMob = () => window.innerWidth <= 640;
        const PALETTE = ["#3b82f6", "#8b5cf6", "#f43f5e", "#10b981", "#f59e0b", "#ec4899", "#06b6d4"];
        const hue = s => PALETTE[(s?.charCodeAt(0) ?? 0) % PALETTE.length];

        let ws = null, myId = null, myName = "", myRoom = "";
        let localStream = null, screenStream = null;
        let isMic = true, isCam = true, isScreen = false;
        let pendingOffer = null, unread = 0;
        const peers = new Map();
        const roomUsers = new Map();
        const ICE = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }, { urls: "stun:stun1.l.google.com:19302" }] };

        // Toast
        let tt;
        function toast(msg, ms = 3000) { const t = $("#toast"); t.textContent = msg; t.classList.add("show"); clearTimeout(tt); tt = setTimeout(() => t.classList.remove("show"), ms); }
        function fmt(b) { if (b < 1024) return b + " B"; if (b < 1048576) return (b / 1024).toFixed(1) + " KB"; return (b / 1048576).toFixed(1) + " MB"; }
        function ficon(m = "") { if (m.startsWith("image/")) return "🖼️"; if (m.startsWith("video/")) return "🎬"; if (m.startsWith("audio/")) return "🎵"; if (m.includes("pdf")) return "📄"; if (m.includes("zip")) return "🗜️"; return "📁"; }

        // Drawers
        function openDrawer(w) { $(`#drawer-${w}`).classList.add("open"); $(`#overlay-${w}`).classList.add("show"); if (w === "chat") { unread = 0; updateBadge(); } }
        function closeDrawer(w) { $(`#drawer-${w}`).classList.remove("open"); $(`#overlay-${w}`).classList.remove("show"); $$(".tab-item").forEach(t => t.classList.remove("active")); $("#tab-video").classList.add("active"); }
        function updateBadge() {
            const b = $("#chat-badge"), db = $("#badge");
            if (unread > 0) { b.textContent = unread > 9 ? "9+" : unread; b.classList.add("show"); db.textContent = unread; db.style.display = "inline"; }
            else { b.classList.remove("show"); db.style.display = "none"; }
        }
        $$(".tab-item").forEach(tab => {
            tab.addEventListener("click", () => {
                const t = tab.dataset.tab; $$(".tab-item").forEach(x => x.classList.remove("active")); tab.classList.add("active");
                if (t === "video") { closeDrawer("people"); closeDrawer("chat"); }
                if (t === "people") { closeDrawer("chat"); openDrawer("people"); }
                if (t === "chat") { closeDrawer("people"); openDrawer("chat"); }
            });
        });
        ["people", "chat"].forEach(w => { $(`#overlay-${w}`).addEventListener("click", () => closeDrawer(w)); $(`#close-${w}`).addEventListener("click", () => closeDrawer(w)); });

        // WebSocket
        function connectWS() {
            const proto = location.protocol === "https:" ? "wss" : "ws";
            ws = new WebSocket(`${proto}://${location.host}`);
            ws.onopen = () => { $("#ws-dot").classList.add("connected"); };
            ws.onclose = () => { $("#ws-dot").classList.remove("connected"); toast("⚠️ Reconnecting…"); setTimeout(connectWS, 2000); };
            ws.onerror = e => console.error("WS", e);
            ws.onmessage = ev => handleMsg(JSON.parse(ev.data));
        }
        function wsSend(p) { if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(p)); }

        function handleMsg(msg) {
            switch (msg.type) {
                case "connected": myId = msg.socketId; break;
                case "room-users": msg.users.forEach(u => roomUsers.set(u.socketId, { username: u.username })); renderUsers(); msg.users.forEach(u => callPeer(u.socketId, "video")); break;
                case "user-joined": roomUsers.set(msg.socketId, { username: msg.username }); renderUsers(); toast("👋 " + msg.username + " joined"); break;
                case "user-left": roomUsers.delete(msg.socketId); removeTile(msg.socketId); peers.get(msg.socketId)?.close(); peers.delete(msg.socketId); renderUsers(); toast("👋 " + msg.username + " left"); break;
                case "offer": pendingOffer = { from: msg.from, username: msg.username, offer: msg.offer, callType: msg.callType }; showCall(msg.username, msg.callType); break;
                case "answer": peers.get(msg.from)?.setRemoteDescription(new RTCSessionDescription(msg.answer)); break;
                case "ice-candidate": peers.get(msg.from)?.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(() => { }); break;
                case "call-rejected": toast("❌ " + (roomUsers.get(msg.from)?.username ?? "User") + " declined"); peers.get(msg.from)?.close(); peers.delete(msg.from); break;
                case "call-ended": removeTile(msg.from); peers.get(msg.from)?.close(); peers.delete(msg.from); break;
                case "chat-message": case "file-shared":
                    appendMsg(msg);
                    if (isMob() && !$("#drawer-chat").classList.contains("open")) { unread++; updateBadge(); }
                    break;
            }
        }

        // Join
        $("#btn-join").onclick = async () => {
            const name = $("#inp-name").value.trim(), room = $("#inp-room").value.trim();
            if (!name || !room) { toast("⚠️ Fill in both fields"); return; }
            myName = name; myRoom = room;
            $("#join-screen").style.display = "none";
            $("#app").classList.add("active");
            $("#room-label").textContent = room;
            $("#me-label").textContent = name;
            connectWS(); await startMedia();
            const tryJoin = () => { if (myId) { wsSend({ type: "join-room", roomId: room, username: name }); renderUsers(); } else setTimeout(tryJoin, 100); };
            tryJoin();
        };
        ["#inp-name", "#inp-room"].forEach(s => $(s).addEventListener("keydown", e => { if (e.key === "Enter") $("#btn-join").click(); }));

        // Media
        async function startMedia() {
            try { localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); }
            catch { try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false }); toast("Camera unavailable — audio only"); } catch { toast("Media access denied"); return; } }
            addTile("local", myName, localStream);
        }

        // Tiles
        function addTile(id, name, stream) {
            const ex = document.getElementById("tile-" + id); if (ex) { ex.querySelector("video").srcObject = stream; return; }
            const tile = mk("div", "v-tile"); tile.id = "tile-" + id;
            const v = mk("video"); v.autoplay = true; v.playsinline = true; if (id === "local") v.muted = true; v.srcObject = stream;
            const lbl = mk("div", "tname"); lbl.textContent = name + (id === "local" ? " (You)" : "");
            const mute = mk("div", "tmute"); mute.textContent = "🔇";
            const nc = mk("div", "no-cam"); nc.innerHTML = '<span class="big">🙈</span><span>' + name + '</span>';
            tile.append(v, lbl, mute, nc); $("#video-grid").appendChild(tile);
        }
        function removeTile(id) { document.getElementById("tile-" + id)?.remove(); }

        // Peers
        function createPeer(socketId) {
            const pc = new RTCPeerConnection(ICE); peers.set(socketId, pc);
            localStream?.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = ({ streams }) => { const u = roomUsers.get(socketId); addTile(socketId, u?.username ?? socketId, streams[0]); };
            pc.onicecandidate = ({ candidate }) => { if (candidate) wsSend({ type: "ice-candidate", to: socketId, candidate }); };
            pc.onconnectionstatechange = () => { if (["failed", "disconnected", "closed"].includes(pc.connectionState)) { removeTile(socketId); pc.close(); peers.delete(socketId); } };
            return pc;
        }
        async function callPeer(socketId, callType = "video") {
            const pc = createPeer(socketId);
            const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
            wsSend({ type: "offer", to: socketId, offer, callType });
        }

        // Call overlay
        function showCall(username, callType) {
            const av = $("#call-av"); av.textContent = (username ?? "?")[0].toUpperCase(); av.style.background = hue(username ?? "?");
            $("#call-caller").textContent = username ?? "Unknown";
            $("#call-kind").textContent = callType === "video" ? "📹 Video Call" : "🎤 Audio Call";
            $("#call-overlay").classList.add("show");
        }
        $("#btn-accept").onclick = async () => {
            if (!pendingOffer) return; const { from, offer } = pendingOffer; $("#call-overlay").classList.remove("show");
            const pc = createPeer(from); await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer(); await pc.setLocalDescription(answer);
            wsSend({ type: "answer", to: from, answer }); pendingOffer = null;
        };
        $("#btn-decline").onclick = () => { if (!pendingOffer) return; wsSend({ type: "call-rejected", to: pendingOffer.from }); $("#call-overlay").classList.remove("show"); pendingOffer = null; };

        // Render users (both lists)
        function mkUserRow(username, socketId, isMe) {
            const row = mk("div", "user-row");
            const av = mk("div", "av"); av.style.background = hue(username); av.textContent = username[0]?.toUpperCase();
            const info = mk("div", "user-info");
            info.innerHTML = '<div class="uname">' + username + '</div><div class="ustag">' + (isMe ? "You" : "Online") + '</div>';
            row.append(av, info);
            if (!isMe) {
                const btns = mk("div", "peer-btns");
                const vb = mk("button", "peer-btn pbtn-v"); vb.textContent = "📹"; vb.onclick = () => callPeer(socketId, "video");
                const ab = mk("button", "peer-btn pbtn-a"); ab.textContent = "📞"; ab.onclick = () => callPeer(socketId, "audio");
                btns.append(vb, ab); row.append(btns);
            }
            return row;
        }
        function renderUsers() {
            ["#users-list", "#users-list-mobile"].forEach(sel => {
                const list = $(sel); if (!list) return; list.innerHTML = "";
                list.appendChild(mkUserRow(myName, myId, true));
                roomUsers.forEach(({ username }, socketId) => list.appendChild(mkUserRow(username, socketId, false)));
            });
            const pb = $("#people-badge"); pb.textContent = roomUsers.size + 1;
        }

        // Controls
        $("#btn-mic").onclick = () => { isMic = !isMic; localStream?.getAudioTracks().forEach(t => t.enabled = isMic); $("#btn-mic").classList.toggle("on", isMic); $("#btn-mic").classList.toggle("warn", !isMic); document.getElementById("tile-local")?.classList.toggle("muted", !isMic); };
        $("#btn-cam").onclick = () => { isCam = !isCam; localStream?.getVideoTracks().forEach(t => t.enabled = isCam); $("#btn-cam").classList.toggle("on", isCam); $("#btn-cam").classList.toggle("warn", !isCam); document.getElementById("tile-local")?.classList.toggle("cam-off", !isCam); };
        $("#btn-screen").onclick = async () => {
            if (isScreen) {
                screenStream?.getTracks().forEach(t => t.stop()); isScreen = false; $("#btn-screen").classList.remove("on");
                const vt = localStream?.getVideoTracks()[0];
                if (vt) { peers.forEach(pc => pc.getSenders().find(s => s.track?.kind === "video")?.replaceTrack(vt)); document.querySelector("#tile-local video").srcObject = localStream; }
                toast("🖥️ Stopped sharing");
            } else {
                try {
                    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const st = screenStream.getVideoTracks()[0]; isScreen = true; $("#btn-screen").classList.add("on");
                    peers.forEach(pc => pc.getSenders().find(s => s.track?.kind === "video")?.replaceTrack(st));
                    document.querySelector("#tile-local video").srcObject = screenStream;
                    st.onended = () => $("#btn-screen").click(); toast("🖥️ Sharing screen");
                } catch { toast("Screen share cancelled"); }
            }
        };
        $("#btn-hangup").onclick = () => { peers.forEach((pc, id) => { wsSend({ type: "call-ended", to: id }); pc.close(); removeTile(id); }); peers.clear(); toast("📵 Call ended"); };

        // Chat
        function appendMsg(data) {
            const mine = data.socketId === myId;
            ["#msgs-desktop", "#msgs-mobile"].forEach(sel => {
                const c = $(sel); if (!c) return;
                const wrap = mk("div", "msg" + (mine ? " mine" : ""));
                const time = new Date(data.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
                const meta = mk("div", "mmeta"); meta.textContent = mine ? time : data.username + " · " + time;
                if (data.msgType === "file") {
                    const a = mk("a", "mfile"); a.href = data.filePath; a.target = "_blank"; a.download = data.fileName;
                    a.innerHTML = '<span class="ficon">' + ficon(data.mimeType) + '</span><div class="finfo"><div class="fname">' + data.fileName + '</div><div class="fsize">' + fmt(data.fileSize) + '</div></div>';
                    wrap.append(meta, a);
                } else {
                    const bub = mk("div", "mbubble"); bub.textContent = data.message; wrap.append(meta, bub);
                }
                c.appendChild(wrap); c.scrollTop = c.scrollHeight;
            });
        }
        function sendMsg(inputId) { const inp = $(inputId); const text = inp.value.trim(); if (!text) return; wsSend({ type: "chat-message", roomId: myRoom, message: text }); inp.value = ""; inp.style.height = "40px"; }
        [["#btn-send-desktop", "#msg-txt-desktop"], ["#btn-send-mobile", "#msg-txt-mobile"]].forEach(([btn, txt]) => {
            $(btn).onclick = () => sendMsg(txt);
            $(txt).addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(txt); } });
            $(txt).addEventListener("input", function () { this.style.height = "40px"; this.style.height = Math.min(this.scrollHeight, 100) + "px"; });
        });

        // File upload
        ["#btn-file-desktop", "#btn-file-mobile"].forEach(s => $(s).onclick = () => $("#file-inp").click());
        $("#file-inp").onchange = async () => {
            const file = $("#file-inp").files[0]; if (!file) return;
            const fd = new FormData(); fd.append("file", file); toast("⬆️ Uploading " + file.name + "…");
            try { const res = await fetch("/upload", { method: "POST", body: fd }); const data = await res.json(); wsSend({ type: "file-shared", roomId: myRoom, ...data }); toast("✅ " + file.name + " shared!"); }
            catch { toast("❌ Upload failed"); }
            $("#file-inp").value = "";
        };
    </script>
</body>

</html>
